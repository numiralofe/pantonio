<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>panton.io</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      color: white;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 28%),
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04), transparent 20%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.03), transparent 22%),
        linear-gradient(to bottom, rgba(255,255,255,0.02), transparent 25%, transparent 75%, rgba(255,255,255,0.02));
      pointer-events: none;
    }

    .wordmark {
      position: relative;
      z-index: 1;
      padding: 2rem 2.25rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.08em;
      font-size: clamp(2.8rem, 12vw, 8rem);
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="wordmark">panton.io</div>
</body>
</html>
